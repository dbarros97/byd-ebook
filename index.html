<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">BYD: A Invasão dos Deuses | Ebook</title>
<meta name="description" id="meta-desc" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--paper:#F5F0E8;--paper-dark:#E8E0D0;--ink:#2A2520;--ink-mid:#5A5045;
--bronze:#8B7355;--bronze-dark:#6B5535;--bronze-light:#B8A080;
--cream:#FAF6EE;--warm-white:#FDFBF7;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--warm-white);overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
pointer-events:none;z-index:9999}

/* LANG SWITCHER */
.lang-switch{position:fixed;top:20px;right:24px;z-index:100;display:flex;gap:4px;
background:rgba(245,240,232,0.9);backdrop-filter:blur(8px);border-radius:30px;
padding:4px;border:1px solid rgba(139,115,85,0.2);box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.lang-switch a{padding:6px 16px;border-radius:26px;font-size:0.8rem;font-weight:700;
text-decoration:none;color:var(--ink-mid);transition:all 0.2s}
.lang-switch a.active{background:var(--ink);color:var(--paper)}
.lang-switch a:not(.active):hover{background:rgba(139,115,85,0.1)}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(175deg,var(--paper) 0%,var(--paper-dark) 40%,var(--bronze-light) 100%);
position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;
background:linear-gradient(transparent,var(--warm-white))}
.hero-inner{display:flex;align-items:center;gap:80px;max-width:1100px;padding:60px 40px;position:relative;z-index:2}
.book-mockup{flex-shrink:0;width:320px;position:relative}
.book-mockup img{width:100%;border-radius:4px;
box-shadow:20px 20px 60px rgba(42,37,32,0.3),-5px -5px 20px rgba(255,255,255,0.3);
transform:perspective(800px) rotateY(-8deg) rotateX(2deg);transition:transform 0.6s cubic-bezier(0.23,1,0.32,1)}
.book-mockup:hover img{transform:perspective(800px) rotateY(-2deg) rotateX(1deg)}
.book-mockup::before{content:'';position:absolute;left:-8px;top:8px;bottom:8px;width:28px;
background:linear-gradient(90deg,var(--bronze-dark),var(--bronze));border-radius:3px 0 0 3px;
transform:perspective(800px) rotateY(-8deg);box-shadow:-4px 4px 15px rgba(42,37,32,0.3)}
.hero-text{flex:1}
.hero-text .label{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;
color:var(--bronze);margin-bottom:16px;font-weight:700}
.hero-text h1{font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:700;line-height:1.1;color:var(--ink);margin-bottom:12px}
.hero-text h1 span{display:block;font-size:1.8rem;font-weight:400;font-style:italic;color:var(--ink-mid);margin-top:8px}
.hero-text .tagline{font-size:1.05rem;line-height:1.7;color:var(--ink-mid);margin:24px 0 36px;max-width:440px}
.btn-buy{display:inline-flex;align-items:center;gap:12px;padding:18px 44px;background:var(--ink);color:var(--paper);
font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:700;border:none;border-radius:60px;cursor:pointer;
text-decoration:none;transition:all 0.4s ease;box-shadow:0 8px 30px rgba(42,37,32,0.25)}
.btn-buy:hover{background:var(--bronze-dark);transform:translateY(-2px);box-shadow:0 12px 40px rgba(42,37,32,0.3)}
.btn-buy .price{background:rgba(255,255,255,0.15);padding:4px 14px;border-radius:30px;font-size:0.9rem}
.btn-buy .arrow{font-size:1.3rem;transition:transform 0.3s ease}
.btn-buy:hover .arrow{transform:translateX(4px)}
.hero-trust{margin-top:20px;font-size:0.8rem;color:var(--ink-mid);opacity:0.7}

section{padding:100px 40px}
.container{max-width:900px;margin:0 auto}

.about{background:var(--warm-white)}
.about h2,.chapters h2,.excerpt-text h2,.cta h2{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--ink)}
.about h2,.chapters h2{font-size:2.4rem;margin-bottom:40px;text-align:center}
.about h2::after,.chapters h2::after{content:'';display:block;width:60px;height:2px;background:var(--bronze);margin:16px auto 0}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:50px;margin-top:50px}
.about-card{padding:32px;border-radius:12px;background:var(--paper);border:1px solid rgba(139,115,85,0.15);transition:transform 0.3s ease,box-shadow 0.3s ease}
.about-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(42,37,32,0.08)}
.about-card .icon{font-size:2rem;margin-bottom:16px;display:block}
.about-card h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;margin-bottom:10px;color:var(--ink)}
.about-card p{font-size:0.92rem;line-height:1.7;color:var(--ink-mid)}

.chapters{background:var(--paper)}
.chapters h2{margin-bottom:50px}
.chapter-list{list-style:none;max-width:600px;margin:0 auto}
.chapter-list li{padding:14px 0;border-bottom:1px solid rgba(139,115,85,0.12);display:flex;align-items:baseline;gap:16px;font-size:0.95rem;color:var(--ink-mid)}
.chapter-list li .ch-num{font-weight:700;font-size:0.75rem;color:var(--bronze);min-width:30px;letter-spacing:0.05em}
.chapter-list li .ch-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--ink)}

.excerpt{background:var(--warm-white);position:relative}
.excerpt-inner{display:flex;gap:60px;align-items:center}
.excerpt-img{flex-shrink:0;width:340px;border-radius:8px;overflow:hidden;box-shadow:0 8px 30px rgba(42,37,32,0.12)}
.excerpt-img img{width:100%;display:block}
.excerpt-text h2{font-size:2rem;margin-bottom:20px}
.excerpt-text blockquote{font-family:'Cormorant Garamond',serif;font-size:1.15rem;line-height:1.8;color:var(--ink-mid);font-style:italic;border-left:3px solid var(--bronze);padding-left:24px;margin:20px 0}

.cta{background:linear-gradient(170deg,var(--ink) 0%,#3A352E 100%);text-align:center;color:var(--paper)}
.cta h2{font-size:2.6rem;margin-bottom:16px;color:var(--paper)}
.cta p{font-size:1.05rem;color:var(--bronze-light);margin-bottom:40px;max-width:500px;margin-left:auto;margin-right:auto;line-height:1.7}
.cta .btn-buy{background:var(--bronze);color:var(--warm-white)}
.cta .btn-buy:hover{background:var(--bronze-light);color:var(--ink)}
.cta-details{margin-top:24px;font-size:0.82rem;color:var(--bronze-light);opacity:0.6}
.cta-img{width:200px;margin:0 auto 30px;opacity:0.6}
.cta-img img{width:100%;border-radius:4px}

footer{padding:40px;text-align:center;font-size:0.8rem;color:var(--ink-mid);background:var(--paper);border-top:1px solid rgba(139,115,85,0.1)}
footer a{color:var(--bronze);text-decoration:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.hero-text,.book-mockup{animation:fadeUp 0.8s ease-out both}
.book-mockup{animation-delay:0.2s}
.hero-text{animation-delay:0.4s}

@media(max-width:768px){
.hero-inner{flex-direction:column;gap:40px;text-align:center;padding:40px 24px}
.book-mockup{width:220px}
.book-mockup::before{display:none}
.hero-text h1{font-size:2.6rem}
.hero-text h1 span{font-size:1.3rem}
.hero-text .tagline{margin-left:auto;margin-right:auto}
.about-grid{grid-template-columns:1fr;gap:24px}
.excerpt-inner{flex-direction:column;text-align:center}
.excerpt-img{width:100%;max-width:400px}
.excerpt-text blockquote{text-align:left}
section{padding:60px 24px}
}
</style>
</head>

<h2 data-pt="Um excerto" data-en="An excerpt"></h2>
<blockquote data-pt="&laquo;Portugal e a BYD. &Agrave; primeira vista, uma combinação tão improvável como bacalhau com molho de soja (que, para ser justo, até ficaria bem). Mas olhemos com mais atenção. Portugal é um país fascinante para a mobilidade elétrica. Pequeno, com uma rede elétrica robusta, sol abundante para painéis solares, e uma população urbana onde as distâncias diárias raramente excedem os 50 quilómetros.&raquo;" data-en="&laquo;Portugal and BYD. At first glance, a combination as unlikely as codfish with soy sauce (which, to be fair, would actually taste good). But let's look closer. Portugal is a fascinating country for electric mobility. Small, with a robust power grid, abundant sunshine for solar panels, and an urban population where daily distances rarely exceed 50 kilometres.&raquo;"></blockquote>
<p style="font-size:0.85rem;color:var(--ink-mid);margin-top:16px" data-pt="Cap. 5: Portugal, A Terra dos Descobridores Redescoberta" data-en="Ch. 5: Portugal, The Rediscovered Land"></p>
